<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator with Navbar</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
      color: white;
    }

    /* 🔥 NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links li {
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-links li:hover {
      color: #00c853;
    }

    /* 📱 Responsive */
    @media (max-width: 600px) {
      .nav-links {
        display: none;
      }
    }

    /* Calculator */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 70px);
    }

    .calculator {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 300px;
    }

    .display {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 24px;
      text-align: right;
      background: #1a1a2e;
      color: #fff;
      outline: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .number { background: #3b3b55; color: white; }
    .operator { background: #ff9f43; color: white; }
    .equal { background: #00c853; color: white; grid-column: span 2; }
    .clear { background: #ff3d00; color: white; grid-column: span 2; }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">CalcX</div>
    <ul class="nav-links">
      <li onclick="showSection('home')">Home</li>
      <li onclick="showSection('about')">About</li>
      <li onclick="showSection('contact')">Contact</li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container" id="home">
    <div class="calculator">
      <input type="text" class="display" id="display" disabled>

      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
      </div>
    </div>
  </div>

  <!--OTHER SECTIONS -->
  <div id="about" style="display:none; text-align:center; padding:40px;">
    <h2>About</h2>
    <p>This is a simple calculator built with HTML, CSS, and JavaScript.</p>
  </div>

  <div id="contact" style="display:none; text-align:center; padding:40px;">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </div>

  <script>
    let display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }

    function showSection(section) {
      document.getElementById("home").style.display = "none";
      document.getElementById("about").style.display = "none";
      document.getElementById("contact").style.display = "none";

      document.getElementById(section).style.display = "flex";
    }
  </script>

</body>
</html>
